name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # ወደ v4 አድሷል

    - name: Set up Node.js
      uses: actions/setup-node@v4 # ወደ v4 አድሷል
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # ወደ v4 አድሷል
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Build Vite Project
      run: npm run build

    - name: Add Android Platform
      run: |
        npx cap add android || true
        npx cap sync

    - name: Build APK with Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # ይህ ነው ዋናው ስህተቱን የሚያስተካክለው!
      with:
        name: smartx-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
